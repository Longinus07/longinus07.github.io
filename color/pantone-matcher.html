<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>離線版 PANTONE 色彩比對器</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #333333;
            --border: #e1e4e8;
            --primary: #0085CA;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-weight: 800;
            margin-bottom: 5px;
        }
        .status {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
        }
        .matcher-container {
            display: flex;
            gap: 30px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            flex-wrap: wrap;
        }
        .input-section {
            flex: 1;
            min-width: 250px;
        }
        .output-section {
            flex: 2;
            min-width: 300px;
        }
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            cursor: pointer;
            padding: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
        input[type="text"] {
            padding: 10px 15px;
            font-size: 1.2rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            width: 120px;
            font-family: monospace;
        }
        h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #555;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
        }
        .results-grid {
            display: flex;
            gap: 15px;
        }
        .pantone-chip {
            flex: 1;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .pantone-chip:hover {
            transform: translateY(-5px);
        }
        .chip-color {
            height: 120px;
            width: 100%;
        }
        .chip-info {
            padding: 12px;
            background: white;
            flex-grow: 1;
        }
        .chip-brand {
            font-size: 0.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .chip-name {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .chip-match {
            font-size: 0.75rem;
            color: #888;
        }
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <h1>色彩自動比對器 (離線完整版)</h1>
    <div id="statusLabel" class="status" style="background: #e8fde8;">正在檢查本機資料庫...</div>

    <div class="matcher-container">
        <div class="input-section">
            <h3>1. 指定目標顏色</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px;">點擊左側色塊開啟選色器，或直接輸入 HEX 色碼。</p>
            <div class="color-picker-wrapper">
                <input type="color" id="colorPicker" value="#0085CA">
                <input type="text" id="hexInput" value="#0085CA">
            </div>
        </div>

        <div class="output-section">
            <h3>2. 最接近的 Top 3 PANTONE 顏色</h3>
            <div class="results-grid" id="resultsContainer">
                </div>
        </div>
    </div>

    <div id="toast">已複製色碼!</div>

    <script src="pantone-data.js"></script>

    <script>
        const colorPicker = document.getElementById('colorPicker');
        const hexInput = document.getElementById('hexInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const statusLabel = document.getElementById('statusLabel');
        const toast = document.getElementById('toast');

        let pantoneDB = [];

        // 讀取本機 pantone-data.js 裡面的變數
        function initLocalDatabase() {
            if (typeof pantoneData !== 'undefined') {
                // 將物件轉換為陣列格式
                for (let key in pantoneData) {
                    let hexValue = typeof pantoneData[key] === 'string' ? pantoneData[key] : pantoneData[key].hex;
                    pantoneDB.push({ name: key, hex: hexValue.toUpperCase() });
                }
                statusLabel.innerText = `✅ 成功讀取本機資料庫：共 ${pantoneDB.length} 色`;
                statusLabel.style.background = "#e8fde8";
            } else {
                statusLabel.innerText = `⚠️ 找不到 pantone-data.js，已載入預設的 10 個標準色。請確認檔案是否放在同一資料夾內。`;
                statusLabel.style.background = "#fdf2e8";
                pantoneDB = [
                    { name: "Yellow C", hex: "#FEDD00" }, { name: "Orange 021 C", hex: "#FE5000" },
                    { name: "Warm Red C", hex: "#F9423A" }, { name: "Rubine Red C", hex: "#CE0058" },
                    { name: "Process Blue C", hex: "#0085CA" }, { name: "Green C", hex: "#00AB84" },
                    { name: "Black C", hex: "#2D2926" }, { name: "185 C", hex: "#E4002B" },
                    { name: "200 C", hex: "#BA0C2F" }, { name: "300 C", hex: "#005EB8" }
                ];
            }
            findClosestColors(colorPicker.value);
        }

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function colorDistance(rgb1, rgb2) {
            if (!rgb1 || !rgb2) return 9999;
            return Math.sqrt(
                Math.pow(rgb1.r - rgb2.r, 2) + 
                Math.pow(rgb1.g - rgb2.g, 2) + 
                Math.pow(rgb1.b - rgb2.b, 2)
            );
        }

        function findClosestColors(targetHex) {
            if(pantoneDB.length === 0) return;
            const targetRgb = hexToRgb(targetHex);
            if(!targetRgb) return;

            let scoredColors = pantoneDB.map(p => {
                let pRgb = hexToRgb(p.hex);
                let dist = colorDistance(targetRgb, pRgb);
                return { ...p, distance: dist };
            });

            scoredColors.sort((a, b) => a.distance - b.distance);
            renderResults(scoredColors.slice(0, 3));
        }

        function renderResults(topColors) {
            resultsContainer.innerHTML = '';
            
            topColors.forEach((color, index) => {
                const matchPercent = Math.max(0, 100 - (color.distance / 4.42)).toFixed(1);
                
                const chip = document.createElement('div');
                chip.className = 'pantone-chip';
                chip.onclick = () => copyText(color.hex);
                
                chip.innerHTML = `
                    <div class="chip-color" style="background-color: ${color.hex}"></div>
                    <div class="chip-info">
                        <div class="chip-brand">PANTONE&reg;</div>
                        <div class="chip-name">${color.name}</div>
                        <div class="chip-match">${index === 0 ? '🏆 最佳匹配' : '近似色'} (相似度 ${matchPercent}%)</div>
                    </div>
                `;
                resultsContainer.appendChild(chip);
            });
        }

        colorPicker.addEventListener('input', (e) => {
            hexInput.value = e.target.value.toUpperCase();
            findClosestColors(e.target.value);
        });

        hexInput.addEventListener('input', (e) => {
            let val = e.target.value;
            if(val.length === 7 && val.startsWith('#')) {
                colorPicker.value = val;
                findClosestColors(val);
            }
        });

        function copyText(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                toast.innerText = `已複製 ${text}`;
                toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 1500);
            } catch (err) {}
            
            document.body.removeChild(textArea);
        }

        // 啟動工具
        initLocalDatabase();

    </script>
</body>
</html>
